# ============================================================
# Grafana Dashboard Provisioning (TIP-005)
# Auto-load dashboards from /var/lib/grafana/dashboards/
# ============================================================

apiVersion: 1

providers:
  - name: VietERP Dashboards
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
